<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>關務人員三等資訊處理題庫</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="主要導覽">
        <a class="brand" href="#" aria-label="資訊處理考古題首頁">
          <span class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M4 5.5h16v11H4z" />
              <path d="M8 19h8" />
              <path d="M10 16.5 9 19" />
              <path d="m14 16.5 1 2.5" />
              <path d="m10 9-2 2 2 2" />
              <path d="m14 9 2 2-2 2" />
            </svg>
          </span>
          <span>
            <strong>資訊處理考古題</strong>
            <small>練習、精進、上榜</small>
          </span>
        </a>

        <nav class="nav-list">
          <button class="nav-item active" type="button">
            <span class="icon" data-icon="calendar"></span>
            年度題庫
          </button>
          <button class="nav-item" type="button">
            <span class="icon" data-icon="book"></span>
            章節練習
          </button>
          <button class="nav-item" type="button">
            <span class="icon" data-icon="notebook"></span>
            錯題本
            <span class="badge" id="wrongBadge">1</span>
          </button>
          <button class="nav-item" type="button">
            <span class="icon" data-icon="chart"></span>
            模擬測驗
          </button>
        </nav>

        <div class="sidebar-footer">
          <button class="footer-button" type="button">
            <span class="icon" data-icon="star"></span>
            我的收藏
          </button>
          <button class="footer-button" type="button">
            <span class="icon" data-icon="settings"></span>
            學習設定
          </button>
        </div>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <div>
            <div class="course-heading">
              <p class="course-title" id="examTitle">115年公務人員特種考試關務人員考試</p>
              <p class="course-subtitle" id="examCategory">關務人員考試關務三等_資訊處理(選試英文)</p>
            </div>
            <label class="select-shell">
              <span class="sr-only">選擇科目</span>
              <select id="subjectSelect">
                <option value="國文（作文與測驗）">國文（作文與測驗）</option>
              </select>
            </label>
          </div>

          <div class="exam-tools">
            <span class="timer" id="timer">00:18:42</span>
            <button class="tool-button" id="pauseButton" type="button">
              <span class="icon" data-icon="pause"></span>
              暫停
            </button>
            <button class="tool-button danger" id="resetButton" type="button">
              <span class="icon" data-icon="stop"></span>
              重置練習
            </button>
            <a class="tool-button" id="pdfLink" href="assets/pdfs/115040_10110(1101).pdf" target="_blank" rel="noreferrer">
              <span class="icon" data-icon="book"></span>
              原始 PDF
            </a>
            <button class="profile-button" type="button" aria-label="個人選單">
              <span class="avatar" aria-hidden="true"></span>
              同學你好
            </button>
          </div>
        </header>

        <section class="quiz-layout">
          <article class="question-panel" aria-live="polite">
            <div class="question-meta">
              <div>
                <span class="mode-label">單題練習</span>
                <span id="questionCount">第 1 題 / 共 10 題</span>
              </div>
              <strong id="progressPercent">10%</strong>
            </div>
            <div class="progress-track" aria-hidden="true">
              <span id="progressBar"></span>
            </div>

            <p class="question-type" id="subjectLabel">國文（作文與測驗）</p>
            <h1 id="questionText"></h1>

            <div class="options" id="options"></div>

            <section class="answer-card hidden" id="answerCard">
              <div class="answer-heading">
                <span class="result-icon" id="resultIcon"></span>
                <strong id="answerTitle"></strong>
              </div>
              <p id="answerExplain"></p>
              <p class="reference" id="answerReference"></p>
            </section>
          </article>

          <aside class="review-panel" aria-label="作答總覽">
            <section class="summary">
              <h2>作答總覽</h2>
              <div class="summary-grid">
                <div><span>已作答</span><strong id="answeredCount">0</strong></div>
                <div><span>答對</span><strong class="ok" id="correctCount">0</strong></div>
                <div><span>答錯</span><strong class="bad" id="wrongCount">0</strong></div>
                <div><span>正確率</span><strong id="accuracy">0%</strong></div>
              </div>
            </section>

            <section class="question-map-section">
              <div class="section-heading">
                <h2>題目列表</h2>
                <div class="legend">
                  <span><i class="dot unanswered"></i>未作答</span>
                  <span><i class="dot correct"></i>答對</span>
                  <span><i class="dot wrong"></i>答錯</span>
                  <span><i class="flag-mini"></i>標記</span>
                </div>
              </div>
              <div class="question-map" id="questionMap"></div>
            </section>

            <section class="notes">
              <div class="section-heading">
                <h2>筆記</h2>
                <button id="clearNote" type="button">清除</button>
              </div>
              <textarea id="noteInput" maxlength="200" placeholder="在此輸入筆記..."></textarea>
              <div class="note-actions">
                <span id="noteCount">0 / 200 字</span>
                <button id="saveNote" type="button">儲存筆記</button>
              </div>
            </section>

            <section class="recent-notes">
              <h2>最近筆記</h2>
              <ul id="recentNotes"></ul>
            </section>
          </aside>
        </section>

        <footer class="actionbar">
          <div>
            <button class="secondary-button" id="bookmarkButton" type="button">
              <span class="icon" data-icon="bookmark"></span>
              標記本題
            </button>
            <button class="secondary-button" id="wrongBookButton" type="button">
              <span class="icon" data-icon="plus"></span>
              加入錯題本
            </button>
          </div>
          <button class="primary-button" id="nextButton" type="button">
            下一題
            <span class="icon" data-icon="arrow-right"></span>
          </button>
        </footer>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
